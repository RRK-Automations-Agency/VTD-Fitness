<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
  <title>Architects — VTD Fitness</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .team-avatar { width: 120px; height: 120px; border-radius: 50%; overflow: hidden; margin: 0 auto 24px auto; border: 2px solid var(--border-hover); background: var(--bg-deep); }
    .team-card img { width: 100%; height: 100%; object-fit: cover; }
    .team-role { font-size: 0.85rem; color: var(--primary); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; margin-bottom: 8px; }
  </style>
</head>
<body>

  <header class="header" id="header"></header>

  <section class="page-hero">
    <div class="container">
      <span class="section-label anim-el">Command Unit</span>
      <h1 class="split-text">The <span class="text-gradient">Architects</span></h1>
      <p class="section-desc anim-el">The apex operating unit behind India's most aggressive fitness deployments.</p>
    </div>
  </section>

  <section class="section-padding" style="padding-top: 0;">
    <div class="container">
      <div class="bento-grid stagger-box" style="grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));">
        
        <!-- Command Profile 1 -->
        <div class="glass-panel team-card align-center stagger-item" style="text-align: center; padding: 48px 24px;">
          <div class="team-avatar">
            <img src="INTURI%20REKHA.jpeg" alt="Inturi Rekha" style="object-position: 50% 10%;">
          </div>
          <div class="team-role">Director</div>
          <h3 style="font-size: 1.5rem; margin-bottom: 0;">Inturi Rekha</h3>
        </div>

        <!-- Command Profile 2 -->
        <div class="glass-panel team-card align-center stagger-item" style="text-align: center; padding: 48px 24px;">
          <div class="team-avatar">
            <img src="Varaprasad.jpeg" alt="Vara Prasad" style="object-position: 50% 10%;">
          </div>
          <div class="team-role">Director</div>
          <h3 style="font-size: 1.5rem; margin-bottom: 0;">Vara Prasad</h3>
        </div>

        <!-- Command Profile 3 -->
        <div class="glass-panel team-card align-center stagger-item" style="text-align: center; padding: 48px 24px;">
          <div class="team-avatar">
            <img src="Manoj%20kumar%20.jpeg" alt="Manoj Kumar" style="object-position: 20% 50%;">
          </div>
          <div class="team-role">Manager</div>
          <h3 style="font-size: 1.5rem; margin-bottom: 0;">Manoj Kumar</h3>
        </div>

        <!-- Command Profile 4 -->
        <div class="glass-panel team-card align-center stagger-item" style="text-align: center; padding: 48px 24px;">
          <div class="team-avatar">
            <img src="Sukhanya.jpeg" alt="Sukanya" style="object-position: 50% 20%;">
          </div>
          <div class="team-role">Team Member</div>
          <h3 style="font-size: 1.5rem; margin-bottom: 0;">Sukanya</h3>
        </div>

        <!-- Command Profile 5 -->
        <div class="glass-panel team-card align-center stagger-item" style="text-align: center; padding: 48px 24px;">
          <div class="team-avatar">
            <img src="Manohar.jpeg" alt="Manohar" style="object-position: 50% 60%;">
          </div>
          <div class="team-role">Team Member</div>
          <h3 style="font-size: 1.5rem; margin-bottom: 0;">Manohar</h3>
        </div>

        <!-- Command Profile 6 -->
        <div class="glass-panel team-card align-center stagger-item" style="text-align: center; padding: 48px 24px;">
          <div class="team-avatar">
            <img src="Mahesh%20kumar.jpeg" alt="Mahesh" style="object-position: 50% 10%;">
          </div>
          <div class="team-role">Team Member</div>
          <h3 style="font-size: 1.5rem; margin-bottom: 0;">Mahesh</h3>
        </div>

      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>
  <script src="script.js"></script>
</body>
</html>
